<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Sole Trader Tax Calculator 2026/27</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans p-4 md:p-10">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg p-6 md:p-8 border border-gray-200">
        <h1 class="text-3xl font-bold text-blue-800 mb-2 text-center">Sole Trader Rolling Tax</h1>
        <p class="text-center text-gray-500 mb-8 italic text-sm">2026/2027 Tax Year Estimates</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <h2 class="text-lg font-semibold border-b pb-2">Your Earnings</h2>
                
                <div>
                    <label class="block text-sm font-medium">PAYE Salary (Annual Gross)</label>
                    <input type="number" id="payeIncome" placeholder="e.g. 30000" class="w-full mt-1 p-2 border rounded focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium">Sole Trader Income (To Date)</label>
                    <input type="number" id="stIncome" placeholder="e.g. 15000" class="w-full mt-1 p-2 border rounded focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-red-600">Sole Trader Expenses (To Date)</label>
                    <input type="number" id="stExpenses" placeholder="e.g. 2000" class="w-full mt-1 p-2 border rounded focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="flex items-center space-x-2 pt-2">
                    <input type="checkbox" id="studentLoan" class="h-4 w-4">
                    <label for="studentLoan" class="text-sm">I have a Plan 2 Student Loan</label>
                </div>
            </div>

            <div class="bg-blue-50 rounded-lg p-6 flex flex-col justify-center border border-blue-100">
                <h2 class="text-sm uppercase tracking-wider text-blue-600 font-bold mb-4">Total Tax to Save</h2>
                <div class="text-5xl font-extrabold text-blue-900 mb-4">£<span id="totalTax">0</span></div>
                
                <div class="space-y-2 text-sm text-gray-600">
                    <div class="flex justify-between"><span>Income Tax:</span> <span id="resIncomeTax">£0</span></div>
                    <div class="flex justify-between"><span>Class 4 NI:</span> <span id="resNI">£0</span></div>
                    <div class="flex justify-between"><span>Student Loan:</span> <span id="resSL">£0</span></div>
                </div>
            </div>
        </div>

        <div class="mt-8 p-4 bg-yellow-50 rounded border border-yellow-200 text-xs text-yellow-800">
            <strong>Note:</strong> This calculates the tax due on your <strong>Sole Trader profits only</strong>. 
            It assumes your Personal Allowance (£12,570) is applied to your PAYE salary first.
        </div>
    </div>

    <script>
        const inputs = ['payeIncome', 'stIncome', 'stExpenses', 'studentLoan'];
        
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', calculateTax);
        });

        function calculateTax() {
            // 1. Get Values
            const paye = parseFloat(document.getElementById('payeIncome').value) || 0;
            const stGross = parseFloat(document.getElementById('stIncome').value) || 0;
            const stExp = parseFloat(document.getElementById('stExpenses').value) || 0;
            const hasSL = document.getElementById('studentLoan').checked;

            const stProfit = Math.max(0, stGross - stExp);
            const totalIncome = paye + stProfit;

            // 2. Constants 2026/27
            const PERSONAL_ALLOWANCE = 12570;
            const BASIC_LIMIT = 50270;
            const NI_THRESHOLD = 12570;
            const SL_THRESHOLD = 29385;

            // --- INCOME TAX CALC ---
            // We calculate total tax owed on combined income, then subtract what PAYE already covers.
            function getIncomeTax(amount) {
                let tax = 0;
                let allowance = PERSONAL_ALLOWANCE;
                
                // Taper Personal Allowance if over 100k
                if (amount > 100000) {
                    allowance = Math.max(0, PERSONAL_ALLOWANCE - ((amount - 100000) / 2));
                }

                if (amount > BASIC_LIMIT) {
                    tax += (amount - BASIC_LIMIT) * 0.40;
                    tax += (BASIC_LIMIT - allowance) * 0.20;
                } else if (amount > allowance) {
                    tax += (amount - allowance) * 0.20;
                }
                return tax;
            }

            const totalIncomeTax = getIncomeTax(totalIncome);
            const payeOnlyTax = getIncomeTax(paye);
            const stIncomeTaxOwed = Math.max(0, totalIncomeTax - payeOnlyTax);

            // --- NATIONAL INSURANCE (Class 4) ---
            let niOwed = 0;
            if (stProfit > BASIC_LIMIT) {
                niOwed += (stProfit - BASIC_LIMIT) * 0.02;
                niOwed += (BASIC_LIMIT - NI_THRESHOLD) * 0.06;
            } else if (stProfit > NI_THRESHOLD) {
                niOwed += (stProfit - NI_THRESHOLD) * 0.06;
            }

            // --- STUDENT LOAN (Plan 2) ---
            let slOwed = 0;
            if (hasSL && totalIncome > SL_THRESHOLD) {
                const totalSL = (totalIncome - SL_THRESHOLD) * 0.09;
                const payeSL = Math.max(0, (paye - SL_THRESHOLD) * 0.09);
                slOwed = totalSL - payeSL;
            }

            // 3. Update UI
            const totalToSave = stIncomeTaxOwed + niOwed + slOwed;
            
            document.getElementById('totalTax').innerText = totalToSave.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('resIncomeTax').innerText = '£' + stIncomeTaxOwed.toFixed(2);
            document.getElementById('resNI').innerText = '£' + niOwed.toFixed(2);
            document.getElementById('resSL').innerText = '£' + slOwed.toFixed(2);
        }
    </script>
</body>
</html>
